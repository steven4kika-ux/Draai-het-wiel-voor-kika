
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root{
  --bg:#fff3f4;
  --card:#ffffff;
  --accent:#ff6b6b;
  --accent-dark:#ff4f4f;
  --text:#1f1f1f;
  --muted:#6b6b6b;
  --soft:#fff0f0;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    radial-gradient(120% 60% at 50% -10%, #ffe9ec 0%, transparent 60%),
    linear-gradient(180deg,var(--bg), #ffffff);
  color:var(--text);
}

/* Layout */
.wrapper{
  max-width:440px;
  margin:28px auto 36px;
  padding:0 14px;
}

.card{
  background:var(--card);
  border-radius:28px;
  padding:24px 22px 28px;
  text-align:center;
  box-shadow:
    0 24px 60px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,107,107,.10);
}

h1{
  margin:0 0 6px;
  font-size:28px;
  letter-spacing:.2px;
}

.lead{
  font-size:15px;
  color:var(--muted);
  line-height:1.45;
  margin:0 auto 18px;
  max-width:320px;
}

/* Actieknoppen */
.buttons{
  display:flex;
  gap:12px;
  flex-direction:column;
  margin-bottom:14px;
}

.button{
  padding:16px;
  font-size:18px;
  font-weight:800;
  border:none;
  border-radius:20px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  box-shadow:0 12px 24px rgba(255,107,107,.35);
  transition:
    transform .1s ease,
    box-shadow .15s ease;
}

.button:hover{
  transform:translateY(-1px);
}

.button:active{
  transform:translateY(2px);
  box-shadow:0 6px 14px rgba(0,0,0,.25);
}

/* Info */
.note{
  background:var(--soft);
  color:#5a5a5a;
  font-size:14px;
  padding:10px 12px;
  border-radius:14px;
  margin-bottom:18px;
}

/* Wiel */
.wheel-card{
  background:
    linear-gradient(180deg,#ffffff,#fff6f6);
  border-radius:30px;
  padding:22px 18px 26px;
  box-shadow:
    inset 0 0 0 1px rgba(255,107,107,.15),
    0 14px 34px rgba(0,0,0,.08);
}

.pointer{
  width:0;
  height:0;
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:34px solid var(--accent);
  margin:0 auto -14px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.35));
}

canvas{
  width:92vw;
