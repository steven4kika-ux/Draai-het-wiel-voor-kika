
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root{
  --bg:#fff6f6; --card:#ffffff; --accent:#ff6b6b; --text:#222;
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
.wrapper{max-width:960px;margin:40px auto;padding:0 16px;}
.card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 10px 30px rgba(0,0,0,.1);}
h1{text-align:center;margin:0;}
p.lead{text-align:center;color:#555;}
.buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:20px 0;}
.button{padding:14px 22px;background:var(--accent);color:#fff;font-weight:700;border:none;border-radius:14px;cursor:pointer;min-width:180px}
.note{background:#ffecec;padding:10px;border-radius:10px;font-size:14px;text-align:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px}
@media(max-width:720px){.grid{grid-template-columns:1fr}}
.wheel-card{text-align:center;background:#fffafa;padding:16px;border-radius:16px}
canvas{width:100%;max-width:320px}
.spin-btn{margin-top:12px;width:100%}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:999;}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:100%;text-align:center;position:relative}
.modal-close{position:absolute;right:10px;top:10px;background:#ff6b6b;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer}
.modal-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <h1>Doneer aan KiKa 💛</h1>
    <p class="lead">
      Ik ben Steven en in september skeeler ik 24 uur voor KiKa.
      Dit draaiwiel is mijn bedankje voor jouw steun! 🎡
    </p>

    <div class="buttons">
      <button class="button" onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon','_blank')">
        Doneer nu
      </button>
      <button class="button" onclick="document.getElementById('spinBtn').scrollIntoView({behavior:'smooth'})">
        Ik heb gedoneerd → Draai!
      </button>
    </div>

    <div class="note">Prijzen hebben geen geldwaarde. Bedankt voor je steun!</div>

    <div class="grid">
      <div>
        <h3>Hoe werkt het?</h3>
        <ol>
          <li>Doneer aan KiKa</li>
          <li>Draai aan het wiel</li>
          <li>Mail jezelf je prijs 📧</li>
        </ol>
      </div>

      <div class="wheel-card">
        <canvas id="wheel" width="320" height="320"></canvas>
        <button id="spinBtn" class="button spin-btn">Draai!</button>
      </div>
    </div>
  </div>
</div>

<!-- POP‑UP -->
<div id="modal" class="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">×</button>
    <h2>🎉 Gefeliciteerd!</h2>
    <p id="prizeText"></p>
    <div class="modal-actions">
      <button class="button" id="mailBtn">📧 Mail mijn prijs</button>
      <button class="button" id="closeBtn">Sluiten</button>
    </div>
  </div>
</div>

<script>
/* ===== confetti loader ===== */
function loadConfetti(){
  return new Promise(r=>{
    if(window.confetti)return r()
    const s=document.createElement("script")
    s.src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"
    s.onload=r;document.body.appendChild(s)
  })
}
function confettiBurst(){
  loadConfetti().then(()=>{
    confetti({particleCount:150,spread:70,origin:{y:0.6}})
  })
}

/* ===== prijzen ===== */
const sectors=[
  {label:"😂 Mop",items:["Waarom lachen skeeleraars zo veel? Ze rollen overal in!","Ik vroeg mijn wiel om rust. Hij bleef maar doorgaan."]},
  {label:"💡 Feit",items:["Lachen verlaagt stress.","Elke donatie helpt KiKa écht."]},
  {label:"💛 Quote",items:["Kleine daden maken groot verschil.","Samen kom je verder."]},
  {label:"🔥 Challenge",items:["Stuur vandaag iemand een lief bericht.","Deel de KiKa‑link met 2 vrienden."]},
  {label:"👏 Compliment",items:["Wat ben jij goed bezig!","Dankjewel voor jouw inzet!"]},
  {label:"🧩 Raadsel",items:["Wat wordt natter terwijl het droogt? Een handdoek!"]},
]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")
const radius=160,center=160,angle=2*Math.PI/sectors.length
let rot=0,busy=false

function draw(){
  ctx.clearRect(0,0,320,320)
  sectors.forEach((s,i)=>{
    ctx.beginPath()
    ctx.moveTo(center,center)
    ctx.arc(center,center,radius,i*angle+rot,(i+1)*angle+rot)
    ctx.fillStyle=["#ff6b6b","#ff9f43","#1dd1a1","#54a0ff","#7d5fff","#f368e0"][i]
    ctx.fill()
    ctx.save()
    ctx.translate(center,center)
    ctx.rotate(i*angle+angle/2+rot)
    ctx.textAlign="right"
    ctx.fillStyle="#fff"
    ctx.font="bold 14px Arial"
    ctx.fillText(s.label,140,5)
    ctx.restore()
  })
}

draw()

document.getElementById("spinBtn").onclick=()=>{
  if(busy)return;busy=true
  const spins=5+Math.random()*3
  const target=(Math.random()*2*Math.PI)
  const start=performance.now()

  function anim(t){
    const p=Math.min(1,(t-start)/3000)
    rot=(spins*2*Math.PI+target)*p*p*(3-2*p)
    draw()
    if(p<1)requestAnimationFrame(anim)
    else{
      const index=((Math.ceil((2*Math.PI-rot)%(2*Math.PI)/angle)))%sectors.length
      const prize=sectors[index]
      const text=prize.items[Math.floor(Math.random()*prize.items.length)]
      showModal(`🎁 ${prize.label}: ${text}`)
      busy=false
    }
  }
  requestAnimationFrame(anim)
}

/* ===== modal + mail ===== */
const modal=document.getElementById("modal")
function showModal(text){
  document.getElementById("prizeText").textContent=text
  modal.classList.add("show")
  confettiBurst()

  const subject=encodeURIComponent("Mijn KiKa‑prijs 🎉")
  const body=encodeURIComponent(
`Ik heb deze prijs gewonnen via het KiKa‑draaiwiel:

${text}

Steun KiKa:
https://steven4kika-ux.github.io/Draai-het-wiel-voor-kika/`
)
  document.getElementById("mailBtn").onclick=()=>location.href=`mailto:?subject=${subject}&body=${body}`
}

document.getElementById("modalClose").onclick=()=>modal.classList.remove("show")
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("show")
modal.onclick=e=>{if(e.target===modal)modal.classList.remove("show")}
</script>

</body>
</html>
