
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Draai het wiel voor KiKa 💛</title>

<style>
:root{
  --bg:#fff4f4;
  --card:#ffffff;
  --accent:#ff6b6b;
  --accent-dark:#ff5252;
  --text:#222;
  --muted:#666;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background: linear-gradient(180deg,var(--bg), #ffffff);
  color:var(--text);
}

.wrapper{
  max-width:420px;
  margin:24px auto;
  padding:0 14px;
}

.card{
  background:var(--card);
  border-radius:26px;
  padding:24px 20px 28px;
  text-align:center;
  box-shadow:
    0 20px 50px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,107,107,.08);
}

h1{
  margin:0 0 6px;
  font-size:26px;
}

.lead{
  font-size:15px;
  color:var(--muted);
  line-height:1.45;
  margin:0 0 18px;
}

/* Actieknoppen */
.buttons{
  display:flex;
  gap:12px;
  flex-direction:column;
  margin-bottom:14px;
}

.button{
  padding:16px;
  font-size:18px;
  font-weight:800;
  border:none;
  border-radius:18px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(180deg,var(--accent),var(--accent-dark));
  box-shadow:0 10px 22px rgba(255,107,107,.35);
  transition:.12s ease;
}

.button:active{
  transform: translateY(2px);
  box-shadow:0 6px 12px rgba(0,0,0,.25);
}

/* Info */
.note{
  background:#fff0f0;
  color:#555;
  font-size:14px;
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:16px;
}

/* Wiel */
.wheel-card{
  background:linear-gradient(180deg,#ffffff,#fff5f5);
  border-radius:26px;
  padding:20px 16px 24px;
  box-shadow:
    inset 0 0 0 1px rgba(255,107,107,.15),
    0 10px 30px rgba(0,0,0,.08);
}

.pointer{
  width:0;
  height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-bottom:30px solid var(--accent);
  margin:0 auto -12px;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,.35));
}

canvas{
  width:90vw;
  max-width:300px;
  height:auto;
  background:#fff;
  border-radius:16px;
  box-shadow:
    inset 0 0 0 1px #ffdada,
    0 8px 22px rgba(0,0,0,.12);
}

.spin-btn{
  margin-top:18px;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:999;
}

.modal.show{display:flex}

.modal-box{
  background:#fff;
  border-radius:26px;
  padding:24px 22px 28px;
  max-width:360px;
  width:100%;
  text-align:center;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
}

.modal-box h2{
  margin-top:0;
}

.modal-actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:16px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <h1>Doneer aan KiKa 💛</h1>

    <p class="lead">
      Ik ben Steven en in september skeeler ik 24 uur voor KiKa.<br>
      Als dank voor jouw steun mag je aan dit wiel draaien 🎡
    </p>

    <div class="buttons">
      <button class="button"
        onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon','_blank')">
        Doneer nu
      </button>

      <button class="button"
        onclick="document.getElementById('spinBtn').scrollIntoView({behavior:'smooth'})">
        Ik heb gedoneerd → Draai!
      </button>
    </div>

    <div class="note">Prijzen hebben geen geldwaarde</div>

    <div class="wheel-card">
      <div class="pointer"></div>
      <canvas id="wheel" width="300" height="300"></canvas>
      <button id="spinBtn" class="button spin-btn">Draai!</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>🎉 Gefeliciteerd!</h2>
    <p id="prizeText"></p>

    <div class="modal-actions">
      <button class="button" id="mailBtn">📧 Mail mijn prijs</button>
      <button class="button" id="closeBtn">Sluiten</button>
    </div>
  </div>
</div>

  "💡 Feit: Elke donatie helpt KiKa écht.",

  "🔥 Challenge: Deel de KiKa‑link met 2 vrienden.",
  "👏 Compliment: Wat goed dat jij dit doet!",
  "🧩 Raadsel: Wat wordt natter terwijl het droogt? Een handdoek!",
  "🍀 Geluk: Vandaag heb jij extra geluk verdiend!"
