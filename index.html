
<!doctype html>

<style>
:root {
  --bg:#ffe0ef;
  --text:#222;
  --btn:#3f3f3f;
  --btn-text:#fff;
  --brand:#ffb703;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

main{
  max-width:560px;
  margin:24px auto;
  padding:16px;
  text-align:center;
}

h1{margin:0 0 8px;font-size:28px}
p{margin:0 0 16px}

.actions{display:grid;gap:10px;margin:16px 0}
button{
  border:0;border-radius:999px;
  padding:12px 18px;
  background:var(--btn);
  color:var(--btn-text);
  font-weight:700;
  cursor:pointer;
}

.note{
  background:#fff6f8;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:20px;
  font-size:14px;
  text-align:left;
}

.wheel-wrap{
  position:relative;
  width:320px;height:340px;
  margin:0 auto 28px;
  display:grid;
  place-items:center;
}

.pointer{
  position:absolute;
  top:0;left:50%;
  transform:translate(-50%,-6px);
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:18px solid var(--brand);
  z-index:2;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
}

/* Pointer micro-bounce bij elke “ratel” */
@keyframes tick-bounce {
  0%   { transform:translate(-50%,-6px) rotate(0deg); }
  30%  { transform:translate(-50%,-8px) rotate(-8deg); }
  60%  { transform:translate(-50%,-5px) rotate(4deg); }
  100% { transform:translate(-50%,-6px) rotate(0deg); }
}
.pointer.ticking{ animation:tick-bounce 120ms ease-out; }

canvas#wheel{
  background:#fff;
  border-radius:50%;
}

/* Popup lager in beeld */
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-start;     /* niet exact midden */
  justify-content:center;
  padding-top:50vh;           /* lager in beeld (pas evt. aan naar 22–26vh) */
  z-index:1001;
  pointer-events:none;
}
.modal.open{display:flex}
.modal__card{
  pointer-events:auto;
  background:white;
  border-radius:16px;
  padding:24px;
  width:min(90vw,420px);
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}
.modal__btn{
  background:var(--brand);
  border:0;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}

#confetti{
  position:fixed; inset:0; pointer-events:none; display:none; z-index:1000;
}
#confetti.show{display:block}

.modal__cat{
  margin:0 0 6px;
  font-weight:700;
  color:var(--brand);
}

/* Deelknop + fallback */
.modal__btn--secondary{
  background:#fff; color:#222; border:2px solid var(--brand);
  margin-top:8px;
}
.share{ margin-top:10px; }
.share__fallback{ display:none; margin-top:10px; }
.share__fallback.show{ display:block; }
.share__row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:8px 0; }
.share__link{
  padding:6px 10px; border-radius:999px; background:#f2f2f2; color:#222; text-decoration:none;
  font-weight:600; border:1px solid #e6e6e6;
}
.share__copy{
  border:0; border-radius:8px; padding:6px 10px; background:#efefef; font-weight:600; cursor:pointer;
}
.share__ok{ font-size:12px; color:#3a7; margin-top:6px; min-height:1em; }
</style>
</head>

<body>
<main>

<h1>Draai het wiel voor KiKa 💛</h1>
<p>

<button id="shareBtn" class="modal__btn modal__btn--secondary" onclick="sharePrize()">

      <!-- Fallback -->

  📸 Download badge (PNG)

<script>
/* ========= CATEGORIEËN ========= */
const moppen = [
  "Waarom won de skeeler een prijs? Omdat hij altijd blijft rollen 💪",
  "Ik zou hier een mop plaatsen… maar jij bent de echte winnaar 😄",
  "Gefeliciteerd! Je hebt +1 goed‑gevoel gewonnen ✨",
  "Mijn benen doen 24 uur mee. Jij deed vandaag iets nóg belangrijkers 💛",
  "Dit wiel draait op goede daden — dankjewel! 🙌"
];

const feitjes = [
  "Wist je dat lachen stress vermindert? 😊",
  "Elke donatie helpt KiKa bij beter onderzoek 💛",
  "Bewegen maakt je hersenen aantoonbaar vrolijker 🧠✨",
  "Samen kleine acties doen maakt een groot verschil 🌍"
];

const quotes = [
  "Kleine moeite, groot verschil 💛",
  "Samen maken we kanker kansloos.",
  "Wie goed doet, ontmoet geluk ✨",
  "Vandaag heb jij iets goeds gedaan 🌈"
];

const challenges = [
  "Geef vandaag iemand een compliment 😊",
  "Drink een extra glas water💧 je verdient het...",
  "Stuur dit wiel door naar 1 vriend(in) 🔄",
  "Loop vandaag 5 minuten extra 🚶‍♂️"
];

const verrassingen = [
  "🎉 Confetti‑bonus! Jij bent officieel een Topper!",
  "Virtuele high‑five van Steven 🙌",
  "Deze draai gaf je +1 karma ✨",
  "Je mag trots zijn op jezelf 😁"
];

function randomItem(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

/* ========= RAD: ALLEEN CATEGORIEËN ========= */
const categoryLabels = ['😂 Mop', '🧠 Feit', '💬 Quote', '🎯 Challenge', '🎉 Verrassing'];
const categoryData   = [ moppen, feitjes, quotes, challenges, verrassingen ];

/* ====== Canvas wiel ====== */
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const size = 300, c = size/2, r = 140;

const colors = ["#ffbe0b","#fb5607","#8338ec","#3a86ff","#06d6a0"];
const slice = Math.PI*2/categoryLabels.length;
let rotation = 0, spinning = false;
let selectedIndex = -1;

function drawCategoryLabel(text, radius){
  ctx.textAlign = "right";
  ctx.fillStyle = "#111";
  ctx.font = "bold 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
  ctx.fillText(text, radius - 10, 4);
}

function drawWheel(){
  ctx.clearRect(0,0,size,size);
  ctx.save();
  ctx.translate(c,c);
  ctx.rotate(rotation);

  for(let i=0;i<categoryLabels.length;i++){
    const isSelected = (selectedIndex === i);
    const dimOthers  = (selectedIndex !== -1 && !isSelected);

    ctx.save();
    if (dimOthers) ctx.globalAlpha = 0.4;

    // sector
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,i*slice,(i+1)*slice);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // highlight
    if (isSelected){
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#fff";
      ctx.shadowColor = "rgba(255,255,255,.9)";
      ctx.shadowBlur = 18;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // label
    ctx.rotate(i*slice + slice/2);
    drawCategoryLabel(categoryLabels[i], r);

    ctx.restore();
  }

  ctx.restore();
}

/* ====== Confetti (standaard + oneindige mega-bonus) ====== */
const confettiCanvas = document.getElementById('confetti');
const cfx = confettiCanvas.getContext('2d');

let particles = [];
let confettiRAF = null;
let confettiLoop = false;
let burstTimer = null;

const HARD_LIMIT = 10000;

function resizeConfetti(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  confettiCanvas.width  = Math.floor(innerWidth  * dpr);
  confettiCanvas.height = Math.floor(innerHeight * dpr);
  confettiCanvas.style.width  = innerWidth + 'px';
  confettiCanvas.style.height = innerHeight + 'px';
  cfx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function wheelCenter(){
  const r = canvas.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}

function addBurst({ count=180, g=0.15, spread=9, sizeMul=1, palette } = {}){
  const MAX_PARTICLES = 8000;
  if (particles.length > MAX_PARTICLES) return;

  const o = wheelCenter();
  const colors = palette || ["#ffbe0b","#fb5607","#ff006e","#8338ec","#3a86ff","#06d6a0"];
  for (let i = 0; i < count; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 3 + Math.random() * spread;
    const w = (6 + Math.random()*8)  * sizeMul;
    const h = (8 + Math.random()*12) * sizeMul;
    particles.push({
      x: o.x, y: o.y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      g,
      r: Math.random() * Math.PI,
      vr: (Math.random() - .5) * .35,
      w, h,
      c: colors[Math.floor(Math.random()*colors.length)],
      life: 0,
      maxLife: 4000 + Math.random() * 2500
    });
  }
}

function stepAndDraw(dt){
  cfx.clearRect(0,0,innerWidth,innerHeight);
  const airFriction = Math.pow(0.992, dt/16);

  if (particles.length > HARD_LIMIT){
    particles.splice(0, particles.length - HARD_LIMIT);
  }

  particles = particles.filter(p => {
    p.x  += p.vx * (dt/16);
    p.y  += p.vy * (dt/16);
    p.vy += p.g   * (dt/16);
    p.vx *= airFriction;
    p.r  += p.vr * (dt/16);
    p.life += dt;

    cfx.save();
    cfx.translate(p.x, p.y);
    cfx.rotate(p.r);
    cfx.fillStyle = p.c;
    cfx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cfx.restore();

    const alive = p.life < p.maxLife;
    const onscreen = p.y < innerHeight + 80;
    return alive && onscreen;
  });
}

function tickConfetti(t){
  if (!tickConfetti.prev) tickConfetti.prev = t;
  const dt = Math.min(50, t - tickConfetti.prev);
  tickConfetti.prev = t;

  stepAndDraw(dt);

  if (confettiLoop || particles.length){
    confettiRAF = requestAnimationFrame(tickConfetti);
  } else {
    confettiRAF = null;
    confettiCanvas.classList.remove('show');
  }
}

function ensureAnimating(){
  resizeConfetti();
  confettiCanvas.classList.add('show');
  if (!confettiRAF){
    tickConfetti.prev = 0;
    confettiRAF = requestAnimationFrame(tickConfetti);
  }
}

/* 🎊 Normale confetti (eenmalig) */
function launchStandardConfetti(){
  ensureAnimating();
  addBurst({ count: 180, g: 0.15, spread: 9, sizeMul: 1.0 });
  setTimeout(() => addBurst({ count: 140, g: 0.15, spread: 9, sizeMul: 1.0 }), 300);
}

/* 💥 Oneindige confetti (bonus) — blijft poppen tot popup dicht is */
function startMegaConfetti(){
  if (confettiLoop) return;
  confettiLoop = true;
  ensureAnimating();

  // Initiële triple-knal
  addBurst({ count: 360, g: 0.16, spread: 10, sizeMul: 1.15 });
  setTimeout(() => addBurst({ count: 280, g: 0.16, spread: 10, sizeMul: 1.10 }), 220);
  setTimeout(() => addBurst({ count: 220, g: 0.17, spread: 11, sizeMul: 1.10 }), 480);

  // Doorlopend ritme
  burstTimer = setInterval(() => {
    addBurst({ count: 220, g: 0.17, spread: 11, sizeMul: 1.10 });
    setTimeout(() => addBurst({ count: 160, g: 0.18, spread: 8, sizeMul: 1.00 }), 180);
    if (Math.random() < 0.33){
      setTimeout(() => addBurst({ count: 140, g: 0.19, spread: 9, sizeMul: 1.05 }), 420);
    }
  }, 800);
}

function stopMegaConfetti(){
  confettiLoop = false;
  if (burstTimer){
    clearInterval(burstTimer);
    burstTimer = null;
  }
}

window.addEventListener('resize', () => {
  if (confettiRAF || confettiLoop) resizeConfetti();
});

/* ====== Audio (tick + jingle) ====== */
let audioCtx;
let lastTickIndex = null;
const pointerEl = document.getElementById('pointer');

function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}

/* Vrolijke winnaars-jingle (belletjes + clap + tambourijn) */
function playGameShowJingle({ volume = 0.65 } = {}) {
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(Math.max(0, Math.min(1, volume)), t0);
  master.connect(audioCtx.destination);

  function bell({ freq, start, dur = 0.5, peak = 0.35, pan = 0 }) {
    const sine = audioCtx.createOscillator(), tri = audioCtx.createOscillator();
    sine.type='sine'; tri.type='triangle';
    sine.frequency.setValueAtTime(freq,start);
    tri.frequency.setValueAtTime(freq*2,start);
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.0001,start);
    g.gain.linearRampToValueAtTime(peak,start+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    const p = audioCtx.createStereoPanner(); p.pan.setValueAtTime(pan,start);
    sine.connect(g); tri.connect(g); g.connect(p).connect(master);
    sine.start(start); tri.start(start);
    sine.stop(start+dur+0.05); tri.stop(start+dur+0.05);
  }
  function handClap({ start, gain = 0.24 }) {
    const bursts=[0,0.012,0.028];
    bursts.forEach((off,i)=>{
      const len=Math.floor(audioCtx.sampleRate*0.06);
      const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
      const data=buf.getChannelData(0);
      for(let n=0;n<len;n++){ const w=(Math.random()*2-1); data[n]=w*Math.pow(1-n/len,2.2); }
      const src=audioCtx.createBufferSource(); src.buffer=buf;
      const g=audioCtx.createGain(); const decay=0.06+i*0.02;
      g.gain.setValueAtTime(gain*(1-i*0.2),start+off);
      g.gain.exponentialRampToValueAtTime(0.0001,start+off+decay);
      src.connect(g).connect(master); src.start(start+off); src.stop(start+off+decay+0.02);
    });
  }
  function tambourine({ start, dur = 0.25, gain = 0.08, pan = 0.1 }) {
    const len=Math.floor(audioCtx.sampleRate*dur);
    const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<len;i++){ const t=i/len; const n=(Math.random()*2-1); data[i]=n*(0.8+0.2*Math.random())*Math.pow(1-t,2.0); }
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const g=audioCtx.createGain(); g.gain.setValueAtTime(gain,start);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    const p=audioCtx.createStereoPanner(); p.pan.setValueAtTime(pan,start);
    src.connect(g).connect(p).connect(master); src.start(start); src.stop(start+dur+0.05);
  }

  if (navigator.vibrate) navigator.vibrate([10,20,10]);

  handClap({ start:t0+0.00, gain:0.24 });
  tambourine({ start:t0+0.00, dur:0.22, gain:0.08, pan:0.12 });
  bell({ freq:784.00, start:t0+0.02, dur:0.45, peak:0.32, pan:-0.05 });

  const chordStart=t0+0.18;
  bell({ freq:523.25, start:chordStart+0.00, dur:0.42, peak:0.28, pan:-0.12 });
  bell({ freq:659.25, start:chordStart+0.01, dur:0.42, peak:0.26, pan:0.00 });
  bell({ freq:783.99, start:chordStart+0.02, dur:0.42, peak:0.24, pan:0.12 });

  bell({ freq:349.23*2, start:chordStart+0.20, dur:0.38, peak:0.26, pan:-0.1 });
  bell({ freq:440.00*2, start:chordStart+0.21, dur:0.38, peak:0.24, pan:0.0 });
  bell({ freq:261.63*2, start:chordStart+0.22, dur:0.38, peak:0.24, pan:0.1 });

  bell({ freq:392.00*2, start:chordStart+0.38, dur:0.38, peak:0.26, pan:-0.1 });
  bell({ freq:493.88*2, start:chordStart+0.39, dur:0.38, peak:0.24, pan:0.0 });
  bell({ freq:293.66*2, start:chordStart+0.40, dur:0.38, peak:0.22, pan:0.1 });

  const spStart=t0+0.44;
  [1046.50,1174.66,1318.51,1567.98,1760.00,2093.00].forEach((f,i)=>{
    bell({ freq:f, start:spStart+i*0.05, dur:0.22, peak:0.18-i*0.02, pan:(i-2)*0.12 });
  });

  const end=t0+0.76;
  handClap({ start:end+0.02, gain:0.20 });
  tambourine({ start:end+0.00, dur:0.22, gain:0.1, pan:-0.1 });
  bell({ freq:523.25, start:end+0.00, dur:0.5, peak:0.34, pan:-0.08 });
  bell({ freq:659.25, start:end+0.01, dur:0.5, peak:0.32, pan:0.00 });
  bell({ freq:783.99, start:end+0.02, dur:0.5, peak:0.30, pan:0.08 });
}

/* 🔔 Tick (per segment) */
function playTick(){
  ensureAudio();
  if (navigator.vibrate) navigator.vibrate(8);
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t0);
  gain.gain.setValueAtTime(0.001, t0);
  gain.gain.linearRampToValueAtTime(0.12, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 0.07);
  if (pointerEl){ pointerEl.classList.remove('ticking'); void pointerEl.offsetWidth; pointerEl.classList.add('ticking'); }
}

/* ====== Mechanische weerstand ====== */
let detentOffset = 0;
const DETENT_BASE = 0.025, DETENT_DECAY = 0.88, DETENT_SNAP_FORWARD = 0.6, DETENT_CLAMP = 0.15;

function spinWheel(){
  if(spinning) return;
  spinning = true;
  lastTickIndex = null;
  detentOffset = 0;
  selectedIndex = -1;
  drawWheel();

  ensureAudio();

  const start = rotation;
  const target = start + Math.random()*Math.PI*6 + Math.PI*4;
  const t0 = performance.now(), DURATION = 2600;

  (function anim(t){
    const p = Math.min((t - t0) / DURATION, 1);
    const baseRot = start + (target - start) * (1 - Math.pow(1 - p, 3));

    detentOffset *= DETENT_DECAY;
    if (detentOffset >  DETENT_CLAMP) detentOffset =  DETENT_CLAMP;
    if (detentOffset < -DETENT_CLAMP) detentOffset = -DETENT_CLAMP;

    rotation = baseRot + detentOffset;
    drawWheel();

    const twoPi = Math.PI * 2;
    const a = (Math.PI*1.5 - (rotation % twoPi) + twoPi) % twoPi;
    const idx = Math.floor(a / slice) % categoryLabels.length;

    if (lastTickIndex === null || idx !== lastTickIndex) {
      playTick();
      const speedFactor = (1 - p) * (1 - p);
      const impulse = DETENT_BASE * (0.35 + 0.65 * speedFactor);
      detentOffset -= impulse;
      setTimeout(()=>{ detentOffset += impulse * DETENT_SNAP_FORWARD; }, 60);
      lastTickIndex = idx;
    }

    if (p < 1) {
      requestAnimationFrame(anim);
    } else {
      spinning = false;

      const finalA = (Math.PI*1.5 - (rotation % twoPi) + twoPi) % twoPi;
      const rawIdx = Math.floor(finalA / slice);
      const finalIdx = ((rawIdx % categoryLabels.length) + categoryLabels.length) % categoryLabels.length;

      selectedIndex = finalIdx;
      drawWheel();

/* ====== Badge-generator (1080×1080 PNG) ====== */

/**
 * Tekent een deelbare badge op een <canvas> en retourneert het canvas.
 * @param {string} prize    - de gewonnen prijs
 * @param {string} category - de categorie (Mop/Feit/Quote/Challenge/Verrassing)
 * @param {object} opts     - { size: 1080 }
 */
function drawBadgeToCanvas(prize, category, opts={}) {
  const size = opts.size || 1080;            // vierkant
  const pad  = Math.round(size * 0.06);      // buitenmarges
  const brand = getComputedStyle(document.documentElement)
                 .getPropertyValue('--brand').trim() || '#ffb703';

  // Canvas + context
  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext('2d');

  // Achtergrond: zachte radiale gradient
  const grad = ctx.createRadialGradient(size*0.5, size*0.4, size*0.1, size*0.5, size*0.6, size*0.8);
  grad.addColorStop(0, '#fff8fb');
  grad.addColorStop(1, '#ffe0ef');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // Subtiele schaduw rand
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  const r = size/2 - pad/2;
  ctx.arc(size/2, size/2, r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Confetti scatter (achtergrond)
  drawConfettiScatter(ctx, size, 90);

  // Titel-badge bovenin
  const topY = pad + 20;
  drawRibbon(ctx, size/2, topY, Math.round(size*0.66), 60, brand);
  ctx.fillStyle = '#111';
  ctx.font = `700 ${Math.round(size*0.06)}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('KiKa wiel – winnaar!', size/2, topY);

  // Categorie pill
  const pillY = topY + Math.round(size*0.12);
  drawPill(ctx, size/2, pillY, Math.round(size*0.34), Math.round(size*0.07), brand);
  ctx.fillStyle = '#111';
  ctx.font = `700 ${Math.round(size*0.05)}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.fillText(category || 'Categorie', size/2, pillY);

  // Grote prijs tekst (meerdere regels)
  const bodyMaxW = size - pad*2;
  const bodyY = pillY + Math.round(size*0.10);
  ctx.fillStyle = '#222';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = `600 ${Math.round(size*0.065)}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  const lines = wrapText(ctx, prize || 'Gefeliciteerd!', bodyMaxW, Math.round(size*0.09), 4);
  drawLines(ctx, lines, size/2, bodyY, Math.round(size*0.09));

  // Footer: call to action
  const ctaY = size - pad - Math.round(size*0.12);
  drawPill(ctx, size/2, ctaY, Math.round(size*0.58), Math.round(size*0.075), '#111');
  ctx.fillStyle = brand;
  ctx.font = `700 ${Math.round(size*0.045)}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.fillText('Draai ook mee & steun KiKa 💛', size/2, ctaY);

  // Kleine URL onderaan
  ctx.fillStyle = '#555';
  ctx.font = `400 ${Math.round(size*0.028)}px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const shareURL = (window.location.origin + window.location.pathname);
  ctx.fillText(shareURL, size/2, size - pad + 10);

  // Voorgrond confetti extra
  drawConfettiScatter(ctx, size, 30, 0.65);

  return cvs;
}

function wrapText(ctx, text, maxWidth, lineHeight, maxLines = 4){
  const words = String(text).split(/\s+/);
  const lines = [];
  let line = '';
  for (let i=0; i<words.length; i++){
    const test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxWidth){
      line = test;
    } else {
      if (line) lines.push(line);
      line = words[i];
      if (lines.length === maxLines - 1){
        // laatste regel met ellipsis
        while (ctx.measureText(line + '…').width > maxWidth && line.length > 0){
          line = line.slice(0, -1);
        }
        lines.push(line + '…');
        return lines;
      }
    }
  }
  if (line) lines.push(line);
  return lines.slice(0, maxLines);
}

function drawLines(ctx, lines, centerX, startY, lineHeight){
  lines.forEach((ln, i) => {
    ctx.fillText(ln, centerX, startY + i*lineHeight);
  });
}

function drawPill(ctx, cx, cy, w, h, color){
  ctx.save();
  ctx.fillStyle = color;
  const r = h/2;
  ctx.beginPath();
  ctx.moveTo(cx - w/2 + r, cy - h/2);
  ctx.arcTo(cx + w/2, cy - h/2, cx + w/2, cy + h/2, r);
  ctx.arcTo(cx + w/2, cy + h/2, cx - w/2, cy + h/2, r);
  ctx.arcTo(cx - w/2, cy + h/2, cx - w/2, cy - h/2, r);
  ctx.arcTo(cx - w/2, cy - h/2, cx + w/2, cy - h/2, r);
  ctx.closePath();
  ctx.shadowColor = 'rgba(0,0,0,.08)';
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.restore();
}

function drawRibbon(ctx, cx, cy, w, h, color){
  // lint met kleine staarten
  const r = 14;
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,.08)';
  ctx.shadowBlur  = 8;
  // basis rechthoek
  ctx.beginPath();
  ctx.moveTo(cx - w/2, cy - h/2);
  ctx.lineTo(cx + w/2, cy - h/2);
  ctx.lineTo(cx + w/2, cy + h/2);
  ctx.lineTo(cx - w/2, cy + h/2);
  ctx.closePath();
  ctx.fill();

  // staarten
  ctx.fillStyle = color;
  const tailW = Math.max(24, Math.round(w*0.06));
  const tailH = Math.max(24, Math.round(h*0.9));
  // links
  ctx.beginPath();
  ctx.moveTo(cx - w/2, cy + h/2);
  ctx.lineTo(cx - w/2 - tailW, cy + h/2 + tailH/2);
  ctx.lineTo(cx - w/2 + tailW*0.3, cy + h/2);
  ctx.closePath();
  ctx.fill();
  // rechts
  ctx.beginPath();
  ctx.moveTo(cx + w/2, cy + h/2);
  ctx.lineTo(cx + w/2 + tailW, cy + h/2 + tailH/2);
  ctx.lineTo(cx + w/2 - tailW*0.3, cy + h/2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawConfettiScatter(ctx, size, count=80, alpha=0.35){
  const colors = ["#ffbe0b","#fb5607","#ff006e","#8338ec","#3a86ff","#06d6a0"];
  ctx.save();
  ctx.globalAlpha = alpha;
  for (let i=0; i<count; i++){
    const x = Math.random()*size;
    const y = Math.random()*size;
    const w = 6 + Math.random()*16;
    const h = 8 + Math.random()*18;
    const r = Math.random()*Math.PI*2;
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(r);
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.restore();
  }
  ctx.restore();
}

/* ====== Popup + confetti-bonus detectie ====== */
function isConfettiBonus(text){
  if (typeof text !== 'string') return false;
  const t = text.normalize('NFKD').toLowerCase().replace(/\s+/g, ' ').trim();
  return (
    t.includes('confetti-bonus') ||
    t.includes('confetti bonus') ||
    /confetti.?bonus/.test(t)
  );
}

let currentWin = { category:'', prize:'' };

const WHEEL_URL  = window.location.origin + window.location.pathname;
const DONATE_URL = 'https://24kika.nl/doneren/?deelnemer=steven-arbon';


function buildShareData(){
  const title = 'KIKA wiel delen'; // nieuwe titel
  const text  = `🎉 ${currentWin.prize}\n\nDraai ook mee & steun KiKa:\n${DONATE_URL}`;
  const url   = WHEEL_URL; // of DONATE_URL als je direct doneren wilt delen
  return { title, text, url };
}


function fillFallbackLinks(){
  const { text, url } = buildShareData();
  const wa = document.getElementById('shareWhatsApp');
  const tw = document.getElementById('shareX');
  const fb = document.getElementById('shareFB');
  const li = document.getElementById('shareLI');

  if (wa) wa.href = `https://wa.me/?text=${encodeURIComponent(text + '\n' + url)}`;
  if (tw) tw.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`;
  if (li) li.href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
}

async function copyShareToClipboard(){
  const { text, url } = buildShareData();
  const payload = `${text}\n${url}`;
  const feedback = document.getElementById('copyFeedback');
  try{
    if (navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(payload);
    }else{
      const ta = document.createElement('textarea');
      ta.value = payload;
      document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    }
    if (feedback) feedback.textContent = 'Gekopieerd ✔️';
  }catch(e){
    if (feedback) feedback.textContent = 'Kopiëren mislukt. Probeer de knoppen hierboven.';
  }
}

// Web Share + fallback
async function sharePrize(){
  const data = buildShareData();
  const fb = document.getElementById('shareFallback');

  if (navigator.share){
    try{
      await navigator.share({ title: data.title, text: data.text, url: data.url });
      if (fb) fb.classList.remove('show');
      return;
    }catch(err){
      // user cancel of not allowed -> toon fallback
    }
  }
  fillFallbackLinks();
  if (fb) fb.classList.add('show');
}
document.getElementById('copyShare')?.addEventListener('click', copyShareToClipboard);

function openModal(prizeText, categoryText){

  document.getElementById('modal').classList.remove('open');

}
