<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root{
  --bg:#fff6f6;
  --card:#ffffff;
  --accent:#ff6b6b;
  --text:#222;
  --muted:#666;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background: linear-gradient(180deg,var(--bg),#fff);
  color:var(--text);
}

.wrapper{
  max-width: 900px;
  margin: 0 auto;
  padding: 16px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  box-shadow:0 12px 30px rgba(0,0,0,.1);
}

h1{text-align:center;margin:6px 0}
.lead{text-align:center;color:var(--muted)}

.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin:16px 0;
}

.button{
  padding:16px;
  font-size:18px;
  font-weight:800;
  color:#fff;
  background:var(--accent);
  border:none;
  border-radius:16px;
  cursor:pointer;
  width:100%;
}

.note{
  background:#ffecec;
  padding:10px;
  border-radius:10px;
  font-size:14px;
  text-align:center;
}

.grid{
  margin-top:20px;
}

.wheel-card{
  background:#fffafa;
  border-radius:16px;
  padding:16px;
  text-align:center;
  margin-top:16px;
}

canvas{
  width:100%;
  max-width:320px;
  height:auto;
}

.spin-btn{
  margin-top:16px;
}

/* Pop-up */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}
.modal.show{display:flex}

.modal-box{
  background:#fff;
  border-radius:18px;
  padding:24px;
  width:100%;
  max-width:420px;
  text-align:center;
}

.modal-actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}

/* Desktop improvement */
@media(min-width:900px){
  .buttons{flex-direction:row}
  .grid{display:flex;gap:32px}
  .wheel-card{flex:1}
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <h1>Doneer aan KiKa 💛</h1>
    <p class="lead">
      Ik ben Steven en in september skeeler ik 24 uur voor KiKa.  
      Dit draaiwiel is mijn bedankje aan jou 🎡
    </p>

    <div class="buttons">
      <button class="button" onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon','_blank')">
        Doneer nu
      </button>
      <button class="button" onclick="document.getElementById('spinBtn').scrollIntoView({behavior:'smooth'})">
        Ik heb gedoneerd → Draai!
      </button>
    </div>

    <div class="note">Prijzen hebben geen geldwaarde</div>

    <div class="grid">

      <div class="wheel-card">
        <canvas id="wheel" width="320" height="320"></canvas>
        <button id="spinBtn" class="button spin-btn">Draai!</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>🎉 Gefeliciteerd!</h2>
    <p id="prizeText"></p>
    <div class="modal-actions">
      <button id="mailBtn" class="button">📧 Mail mijn prijs</button>
      <button id="closeBtn" class="button">Sluiten</button>
    </div>
  </div>
</div>

<script>
/* ================= GELUID (werkt op mobiel) ================= */
let spinSound;
let audioReady = false;

function initAudio(){
  if(audioReady) return;
  spinSound = new Audio("wheel-spin-click-slow-down-101152.mp3");
  spinSound.volume = 0.7;
  audioReady = true;
}

/* ================= PRIJZEN ================= */
const prizes = [
  "😂 Mop: Waarom kan een skeeleraar nooit liegen? Hij glijdt er altijd mee weg!",
  "💡 Feit: Elke donatie helpt KiKa écht.",
  "💛 Quote: Kleine daden maken groot verschil.",
  "🔥 Challenge: Deel de KiKa‑link met 2 vrienden.",
  "👏 Compliment: Wat goed dat jij dit doet!",
  "🧩 Raadsel: Wat wordt natter terwijl het droogt? Een handdoek!"
];

/* ================= WIEL ================= */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const slices = prizes.length;
const angle = 2*Math.PI/slices;
let rotation = 0;
let spinning = false;

function draw(){
  ctx.clearRect(0,0,320,320);
  prizes.forEach((_,i)=>{
    ctx.beginPath();
    ctx.moveTo(160,160);
    ctx.arc(160,160,150,i*angle+rotation,(i+1)*angle+rotation);
    ctx.fillStyle = ["#ff6b6b","#ff9f43","#1dd1a1","#54a0ff","#7d5fff","#f368e0"][i];
    ctx.fill();
  });
}
draw();

document.getElementById("spinBtn").onclick = () => {
  if(spinning) return;
  initAudio();               // 🔑 dit fixeert mobiel
  spinSound.currentTime = 0;
  spinSound.play();

  spinning = true;
  const target = Math.random()*2*Math.PI;
  const start = performance.now();

  function animate(t){
    const p = Math.min(1,(t-start)/3000);
    rotation = target * p;
    draw();
    if(p<1) requestAnimationFrame(animate);
    else{
      const index = Math.floor(((2*Math.PI-rotation)%(2*Math.PI))/angle);
      showModal(prizes[index]);
      spinning = false;
    }
  }
  requestAnimationFrame(animate);
};

/* ================= MODAL ================= */
const modal = document.getElementById("modal");

function showModal(text){
  document.getElementById("prizeText").textContent = text;
  modal.classList.add("show");

  const subject = encodeURIComponent("Mijn KiKa‑prijs 🎉");
  const body = encodeURIComponent(text + "\n\nhttps://24kika.nl");
  document.getElementById("mailBtn").onclick = () =>
    location.href = `mailto:?subject=${subject}&body=${body}`;
}

document.getElementById("closeBtn").onclick = () =>
  modal.classList.remove("show");
</script>

</body>
</html>
