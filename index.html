
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root {
  --bg:#ffe0ef;
  --text:#222;
  --btn:#3f3f3f;
  --btn-text:#fff;
  --brand:#ffb703;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

main{
  max-width:560px;
  margin:24px auto;
  padding:16px;
  text-align:center;
}

h1{margin:0 0 8px;font-size:28px}
p{margin:0 0 16px}

.actions{display:grid;gap:10px;margin:16px 0}
button{
  border:0;border-radius:999px;
  padding:12px 18px;
  background:var(--btn);
  color:var(--btn-text);
  font-weight:700;
  cursor:pointer;
}

.note{
  background:#fff6f8;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:20px;
  font-size:14px;
  text-align:left;
}

.wheel-wrap{
  position:relative;
  width:320px;height:340px;
  margin:0 auto 28px;
  display:grid;
  place-items:center;
}

.pointer{
  position:absolute;
  top:0;left:50%;
  transform:translate(-50%,-6px);
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:18px solid var(--brand);
  z-index:2;
  /* kleine schaduw voor diepte */
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
}

/* Pointer micro-bounce bij elke “ratel” */
@keyframes tick-bounce {
  0%   { transform:translate(-50%,-6px) rotate(0deg); }
  30%  { transform:translate(-50%,-8px) rotate(-8deg); }
  60%  { transform:translate(-50%,-5px) rotate(4deg); }
  100% { transform:translate(-50%,-6px) rotate(0deg); }
}
.pointer.ticking{
  animation:tick-bounce 120ms ease-out;
}

canvas#wheel{
  background:#fff;
  border-radius:50%;
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1001;
  pointer-events:none;
}
.modal.open{display:flex}

.modal__card{
  pointer-events:auto;
  background:white;
  border-radius:16px;
  padding:24px;
  width:min(90vw,420px);
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.modal__btn{
  background:var(--brand);
  border:0;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}

#confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  display:none;
  z-index:1000;
}
#confetti.show{display:block}
</style>
</head>

<body>
<main>

<h1>Draai het wiel voor KiKa 💛</h1>
<p>
Ik ben Steven en in september skeeler ik 24 uur voor KiKa.<br>
Als dank voor jouw steun mag je aan dit wiel draaien 🎉
</p>

<div class="actions">
<button onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon')">
Doneer nu
</button>
<button onclick="spinWheel()">Ik heb gedoneerd → Draai!</button>
</div>

<div class="note">Prijzen hebben geen geldwaarde</div>

<div class="wheel-wrap">
  <div id="pointer" class="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

</main>

<canvas id="confetti"></canvas>

<div id="modal" class="modal">
  <div class="modal__card">
    <h2>Gefeliciteerd 🎉</h2>
    <p id="modalPrize"></p>
    <button class="modal__btn" onclick="closeModal()">Nog een keer draaien</button>
  </div>
</div>


<script>
/* ====== Canvas wiel ====== */
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const size = 300, c = size/2, r = 140;
const labels = ["High five 🙌","Dankjewel 💛","Virtuele knuffel 🤗","Topper ⭐","Goed bezig 🎉","Respect 👏"];
const colors = ["#ffbe0b","#fb5607","#ff006e","#8338ec","#3a86ff","#06d6a0"];
const slice = Math.PI*2/labels.length;
let rotation = 0, spinning = false;

function drawWheel(){
  ctx.clearRect(0,0,size,size);
  ctx.save();
  ctx.translate(c,c); ctx.rotate(rotation);
  for(let i=0;i<labels.length;i++){
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,i*slice,(i+1)*slice);
    ctx.fillStyle = colors[i%colors.length];
    ctx.fill();
    ctx.save();
    ctx.rotate(i*slice+slice/2);
    ctx.fillStyle = "#111";
    ctx.textAlign = "right";
    ctx.font = "14px system-ui";
    ctx.fillText(labels[i], r-10, 5);
    ctx.restore();
  }
  ctx.restore();
}

/* ====== Confetti ====== */
const confettiCanvas = document.getElementById('confetti');
const cfx = confettiCanvas.getContext('2d');
let particles = [];

function resizeConfetti(){
  confettiCanvas.width = innerWidth;
  confettiCanvas.height = innerHeight;
}

function wheelCenter(){
  const r = canvas.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 };
}

function explode(count=160){
  const o = wheelCenter();
  const palette = ["#ffbe0b","#fb5607","#ff006e","#8338ec","#3a86ff","#06d6a0"];
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const s = 4+Math.random()*5;
    particles.push({
      x:o.x,y:o.y,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      g:0.15,
      r:Math.random()*Math.PI,
      vr:(Math.random()-.5)*.3,
      w:6+Math.random()*6,
      h:8+Math.random()*10,
      c:palette[Math.floor(Math.random()*palette.length)]
    });
  }
}

function launchDoubleConfetti(){
  resizeConfetti();
  confettiCanvas.classList.add('show');
  explode(180);
  setTimeout(()=>explode(140),300); // ⭐ tweede knal
  const start = performance.now();
  (function frame(t){
    cfx.clearRect(0,0,innerWidth,innerHeight);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.99;
      cfx.save();
      cfx.translate(p.x,p.y);
      cfx.rotate(p.r+=p.vr);
      cfx.fillStyle=p.c;
      cfx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cfx.restore();
    });
    if(t-start<2600) requestAnimationFrame(frame);
    else { particles=[]; confettiCanvas.classList.remove('show'); }
  })(start);
}

/* ====== Ratel / Tick geluid via Web Audio API ====== */
let audioCtx;
let lastTickIndex = null; // om te detecteren wanneer we een nieuwe slice passeren
const pointerEl = document.getElementById('pointer');

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

unction playGameShowJingle({ volume = 0.7 } = {}) {
  ensureAudio();

  const t0 = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(volume, t0);
  master.connect(audioCtx.destination);

  function osc({ type='sawtooth', freq=440, start=t0, dur=0.5, peak=0.4 }) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);

    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(peak, start + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);

    o.connect(g).connect(master);
    o.start(start);
    o.stop(start + dur + 0.1);
  }

  // BOOM
  osc({ freq:110 });
  // STAB
  osc({ freq:261.63, start:t0+0.05, dur:0.3, peak:0.35 });
  osc({ freq:329.63, start:t0+0.06, dur:0.3, peak:0.32 });
  osc({ freq:392.00, start:t0+0.07, dur:0.3, peak:0.3 });
  // TA‑DA
  osc({ freq:523.25, start:t0+0.6, dur:0.6, peak:0.45 });
  osc({ freq:659.25, start:t0+0.62, dur:0.6, peak:0.42 });

  if (navigator.vibrate) navigator.vibrate([15, 40, 20]);
}


function playTick(){
  ensureAudio();
  if (navigator.vibrate) navigator.vibrate(8);

  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t0);
  gain.gain.setValueAtTime(0.1, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.06);

  pointerEl.classList.remove('ticking');
  void pointerEl.offsetWidth;
  pointerEl.classList.add('ticking');
}

  // Klik-tonetje
  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1100, t0);
  osc.frequency.exponentialRampToValueAtTime(700, t0+0.05);

  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(0.08, t0);
  oscGain.gain.exponentialRampToValueAtTime(0.0001, t0+0.06);

  noise.connect(noiseGain).connect(audioCtx.destination);
  osc.connect(oscGain).connect(audioCtx.destination);

  noise.start(t0); noise.stop(t0+0.03);
  osc.start(t0);   osc.stop(t0+0.06);

  // Pointer micro-bounce
  pointerEl.classList.remove('ticking');
  void pointerEl.offsetWidth; // reflow
  pointerEl.classList.add('ticking');
}

/* ====== Mechanische weerstand ======
   We voegen een extra hoek-offset toe (detentOffset) die
   bij elke tik een kleine terugslag geeft en dan weg-eindt.
========================================================= */
let detentOffset = 0;
const DETENT_BASE = 0.025;   // ~1.43° max-impuls (pas aan voor sterker/zwakker)
const DETENT_DECAY = 0.88;   // demping per frame (0.80 = snel; 0.95 = traag)
const DETENT_SNAP_FORWARD = 0.6; // hoeveel van de terugslag we “terugduwen”
const DETENT_CLAMP = 0.15;   // veiligheid: max |offset| in radialen

function spinWheel(){
  if(spinning) return;
  spinning = true;
  lastTickIndex = null;
  detentOffset = 0;

  ensureAudio(); // ontgrendel audio door user gesture

  const start = rotation;
  const target = start + Math.random()*Math.PI*6 + Math.PI*4; // 4–10π
  const t0 = performance.now();
  const DURATION = 2600; // ms

  (function anim(t){
    const p = Math.min((t - t0) / DURATION, 1);
    // Cubic ease-out
    const baseRot = start + (target - start) * (1 - Math.pow(1 - p, 3));

    // Pas mechanische weerstand toe:
    detentOffset *= DETENT_DECAY;
    // veiligheid clamp
    if (detentOffset >  DETENT_CLAMP) detentOffset =  DETENT_CLAMP;
    if (detentOffset < -DETENT_CLAMP) detentOffset = -DETENT_CLAMP;

    rotation = baseRot + detentOffset;
    drawWheel();

    // Bepaal huidige slice onder de pointer (top = 1.5π)
    const a = (Math.PI*1.5 - rotation + Math.PI*2) % (Math.PI*2);
    const idx = Math.floor(a / slice) % labels.length;

    // Als we in een NIEUW segment zijn: klik + weerstand
    if (lastTickIndex === null || idx !== lastTickIndex) {
      // Geluid/haptics
      playTick();

      // Snelheidsfactor: sterker bij hoge snelheid, subtiel bij lage
      const speedFactor = (1 - p) * (1 - p); // ~deriv van ease-out
      const impulse = DETENT_BASE * (0.35 + 0.65 * speedFactor);

      // 1) mini-terugslag
      detentOffset -= impulse;

      // 2) kleine “snap” vooruit (verhoogt tastbaarheidsgevoel)
      setTimeout(()=> { detentOffset += impulse * DETENT_SNAP_FORWARD; }, 60);

      lastTickIndex = idx;
    }

    if (p < 1) requestAnimationFrame(anim);
    else {
      spinning = false;
      // finale index opnieuw bepalen met definitieve rotation
      const finalA = (Math.PI*1.5 - rotation + Math.PI*2) % (Math.PI*2);
      const finalIdx = Math.floor(finalA / slice) % labels.length;
      openModal(labels[finalIdx]);
    }
  })(t0);

}
function openModal(text){
  document.getElementById('modalPrize').textContent = `Je hebt gewonnen: ${text}`;
  document.getElementById('modal').classList.add('open');

  playGameShowJingle({ volume: 0.7 }); // 📺 GAME SHOW!
  launchDoubleConfetti();
}


function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

drawWheel();
</script>

</body>
</html>
