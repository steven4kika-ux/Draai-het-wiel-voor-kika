<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doneer aan KiKa 💛</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff6f6;
      margin: 0;
      padding: 0;
    }

    .wrapper {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    .buttons {
      margin-top: 30px;
    }

    .button {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: #ff6b6b;
      color: #fff;
      font-weight: bold;
      border-radius: 12px;
      text-decoration: none;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      background: #ffecec;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="card">
      <h1>Doneer aan KiKa 💛</h1>

      <p>
        Na je donatie mag je aan het wiel draaien en win je een mop, feit,
        quote of challenge 🎡
      </p>

      <div class="buttons">
        <a
          class="button"
          href="https://HIER-JE-KIKA-DONEERLINK"
          target="_blank"
doneerd → Draai!
        </a>
      </div>

      <div class="note">
        Prijzen hebben geen geldwaarde. Bedankt voor je steun!
      </div>
    </div>
  </div>

</body>
</html>
