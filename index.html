
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draai het wiel voor KiKa 💛</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff2f2;
  display: flex;
  justify-content: center;
  padding: 24px;
}

.card {
  background: white;
  border-radius: 24px;
  max-width: 420px;
  width: 100%;
  padding: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,.12);
  text-align: center;
}

h1 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 16px;
  border: none;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
}

canvas {
  width: 100%;
  max-width: 260px;
  margin: 20px auto 10px;
  display: block;
}
</style>
</head>

<body>

<div class="card">
  <h1>Doneer aan KiKa 💛</h1>
  <p>Ik ben Steven en skeeler 24 uur voor KiKa.<br>Dit wiel is mijn bedankje 🎡</p>

  <canvas id="wheel" width="260" height="260"></canvas>

  <button id="spinBtn">Draai!</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const prizes = ["😂","💡","💛","🔥","👏","🧩"];
const colors = ["#ff6b6b","#ff9f43","#1dd1a1","#54a0ff","#7d5fff","#f368e0"];
const slice = 2 * Math.PI / prizes.length;

let angle = 0;
let spinning = false;

function draw() {
  ctx.clearRect(0,0,260,260);
  for (let i=0;i<prizes.length;i++) {
    ctx.beginPath();
    ctx.moveTo(130,130);
    ctx.arc(130,130,120, i*slice+angle, (i+1)*slice+angle);
    ctx.fillStyle = colors[i];
    ctx.fill();
  }
}

draw();

document.getElementById("spinBtn").onclick = () => {
  if (spinning) return;
  spinning = true;

  const target = Math.random() * 2 * Math.PI;
  const start = performance.now();

  function animate(t) {
    const p = Math.min(1,(t-start)/2500);
    angle = target * p * p * (3-2*p);
    draw();
    if (p < 1) requestAnimationFrame(animate);
    else spinning = false;
  }
  requestAnimationFrame(animate);
};
</script>

</body>
</html>
