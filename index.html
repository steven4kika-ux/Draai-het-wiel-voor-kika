
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root {
  --bg:#ffe0ef;
  --text:#222;
  --btn:#3f3f3f;
  --btn-text:#fff;
  --brand:#ffb703;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

main{
  max-width:560px;
  margin:24px auto;
  padding:16px;
  text-align:center;
}

h1{margin:0 0 8px;font-size:28px}
p{margin:0 0 16px}

.actions{display:grid;gap:10px;margin:16px 0}
button{
  border:0;border-radius:999px;
  padding:12px 18px;
  background:var(--btn);
  color:var(--btn-text);
  font-weight:700;
  cursor:pointer;
}

.note{
  background:#fff6f8;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:20px;
  font-size:14px;
  text-align:left;
}

.wheel-wrap{
  position:relative;
  width:320px;height:340px;
  margin:0 auto 28px;
  display:grid;
  place-items:center;
}

.pointer{
  position:absolute;
  top:0;left:50%;
  transform:translate(-50%,-6px);
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:18px solid var(--brand);
  z-index:2;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
}

/* Pointer micro-bounce bij elke “ratel” */
@keyframes tick-bounce {
  0%   { transform:translate(-50%,-6px) rotate(0deg); }
  30%  { transform:translate(-50%,-8px) rotate(-8deg); }
  60%  { transform:translate(-50%,-5px) rotate(4deg); }
  100% { transform:translate(-50%,-6px) rotate(0deg); }
}
.pointer.ticking{ animation:tick-bounce 120ms ease-out; }

canvas#wheel{
  background:#fff;
  border-radius:50%;
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-start;     /* ⬅ niet meer exact midden */
  justify-content:center;
  padding-top:50vh;           /* ⬅ popup lager in beeld */
  z-index:1001;
  pointer-events:none;
}

.modal.open{display:flex}
.modal__card{
  pointer-events:auto; background:white; border-radius:16px; padding:24px;
  width:min(90vw,420px); text-align:center; box-shadow:0 20px 40px rgba(0,0,0,.25);
}
.modal__btn{
  background:var(--brand); border:0; padding:10px 16px; border-radius:999px; font-weight:700; cursor:pointer;
}

#confetti{
  position:fixed; inset:0; pointer-events:none; display:none; z-index:1000;
}
#confetti.show{display:block}
  
.modal__cat{
  margin:0 0 6px;
  font-weight:700;
  color:var(--brand);
}
</style>
</head>

<body>
<main>

<h1>Draai het wiel voor KiKa 💛</h1>
<p>
Ik ben Steven en in september skeeler ik 24 uur voor KiKa.<br>
Als dank voor jouw steun mag je aan dit wiel draaien 🎉
</p>

<div class="actions">
  <button onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon')">Doneer nu</button>
  <button onclick="spinWheel()">Ik heb gedoneerd → Draai!</button>
</div>

<div class="note">Prijzen hebben geen geldwaarde</div>

<div class="wheel-wrap">
  <div id="pointer" class="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

</main>

<canvas id="confetti"></canvas>

<div id="modal" class="modal">
  <div class="modal__card">
    <h2>Gefeliciteerd 🎉</h2>
  <p id="modalCategory" class="modal__cat"></p>  
    <p id="modalPrize"></p>
    <button class="modal__btn" onclick="closeModal()">Nog een keer draaien</button>
  </div>
</div>


<script>
/* ========= CATEGORIEËN ========= */
const moppen = [
  "Waarom won de skeeler een prijs? Omdat hij altijd blijft rollen 💪",
  "Ik zou hier een mop plaatsen… maar jij bent de echte winnaar 😄",
  "Gefeliciteerd! Je hebt +1 goed‑gevoel gewonnen ✨",
  "Mijn benen deden 24 uur mee. Jij deed vandaag iets nóg belangrijkers 💛",
  "Dit wiel draait op goede daden — dankjewel 🙌"
];

const feitjes = [
  "Wist je dat lachen stress vermindert? 😊",
  "Elke donatie helpt KiKa bij beter onderzoek 💛",
  "Bewegen maakt je hersenen aantoonbaar vrolijker 🧠✨",
  "Samen kleine acties doen maakt een groot verschil 🌍"
];

const quotes = [
  "Kleine moeite, groot verschil 💛",
  "Samen maken we kanker kansloos.",
  "Wie goed doet, ontmoet geluk ✨",
  "Vandaag heb jij iets goeds gedaan 🌈"
];

const challenges = [
  "Geef vandaag iemand een compliment 😊",
  "Drink een extra glas water 💧",
  "Stuur dit wiel door naar 1 vriend(in) 🔄",
  "Loop vandaag 5 minuten extra 🚶‍♂️"
];

const verrassingen = [
  "🎉 Confetti‑bonus! Jij bent officieel een Topper!",
  "Virtuele high‑five van Steven 🙌",
  "Deze draai gaf je +1 karma ✨",
  "Je mag trots zijn op jezelf 😁"
];

function randomItem(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

/* ========= TEKST OP RAD: ALLEEN CATEGORIEËN ========= */
const categoryLabels = ['😂 Mop', '🧠 Wist je dit?', '💬 Quote', '🎯 Challenge', '🎉 Verrassing'];
const categoryData   = [ moppen, feitjes, quotes, challenges, verrassingen ];

/* ====== Canvas wiel ====== */
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const size = 300, c = size/2, r = 140;

const colors = ["#ffbe0b","#fb5607","#8338ec","#3a86ff","#06d6a0"]; // 1 per categorie
const slice = Math.PI*2/categoryLabels.length;
let rotation = 0, spinning = false;

/* Highlight state: -1 = geen selectie */
let selectedIndex = -1;

function drawCategoryLabel(text, radius){
  ctx.textAlign = "right";
  ctx.fillStyle = "#111";
  ctx.font = "bold 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
  ctx.fillText(text, radius - 10, 4); // tegen buitenrand, licht gecentreerd
}


function drawWheel(){
  ctx.clearRect(0,0,size,size);
  ctx.save();
  ctx.translate(c,c);
  ctx.rotate(rotation);

  for(let i=0;i<categoryLabels.length;i++){
    const isSelected = (selectedIndex === i);
    const dimOthers  = (selectedIndex !== -1 && !isSelected);

    ctx.save();
    if (dimOthers) ctx.globalAlpha = 0.4;

    // sector
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,i*slice,(i+1)*slice);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // highlight
    if (isSelected){
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#fff";
      ctx.shadowColor = "rgba(255,255,255,.9)";
      ctx.shadowBlur = 18;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // label
    ctx.translate(0,0);
    ctx.rotate(i*slice + slice/2);
    drawCategoryLabel(categoryLabels[i], r);

    ctx.restore();
  }

  ctx.restore();
}

/* ====== Confetti ====== */
const confettiCanvas = document.getElementById('confetti');
const cfx = confettiCanvas.getContext('2d');
let particles = [];

function resizeConfetti(){ confettiCanvas.width = innerWidth; confettiCanvas.height = innerHeight; }
function wheelCenter(){
  const rct = canvas.getBoundingClientRect();
  return { x:rct.left+rct.width/2, y:rct.top+rct.height/2 };
}
function explode(count=160){
  const o = wheelCenter();
  const palette = ["#ffbe0b","#fb5607","#ff006e","#8338ec","#3a86ff","#06d6a0"];
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2, s = 4+Math.random()*5;
    particles.push({
      x:o.x,y:o.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, g:0.15,
      r:Math.random()*Math.PI, vr:(Math.random()-.5)*.3,
      w:6+Math.random()*6, h:8+Math.random()*10,
      c:palette[Math.floor(Math.random()*palette.length)]
    });
  }
}
function launchDoubleConfetti(){
  resizeConfetti();
  confettiCanvas.classList.add('show');
  explode(180);
  setTimeout(()=>explode(140),300);
  const start = performance.now();
  (function frame(t){
    cfx.clearRect(0,0,innerWidth,innerHeight);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.99;
      cfx.save(); cfx.translate(p.x,p.y); cfx.rotate(p.r+=p.vr);
      cfx.fillStyle=p.c; cfx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cfx.restore();
    });
    if(t-start<2600) requestAnimationFrame(frame);
    else { particles=[]; confettiCanvas.classList.remove('show'); }
  })(start);
}

/* ====== Audio (tick + jingle) ====== */
let audioCtx;
let lastTickIndex = null;
const pointerEl = document.getElementById('pointer');

function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}

/* Vrolijke winnaars-jingle (belletjes + clap + tambourijn) */
function playGameShowJingle({ volume = 0.65 } = {}) {
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(Math.max(0, Math.min(1, volume)), t0);
  master.connect(audioCtx.destination);

  function bell({ freq, start, dur = 0.5, peak = 0.35, pan = 0 }) {
    const sine = audioCtx.createOscillator(), tri = audioCtx.createOscillator();
    sine.type='sine'; tri.type='triangle';
    sine.frequency.setValueAtTime(freq,start);
    tri.frequency.setValueAtTime(freq*2,start);
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.0001,start);
    g.gain.linearRampToValueAtTime(peak,start+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    const p = audioCtx.createStereoPanner(); p.pan.setValueAtTime(pan,start);
    sine.connect(g); tri.connect(g); g.connect(p).connect(master);
    sine.start(start); tri.start(start);
    sine.stop(start+dur+0.05); tri.stop(start+dur+0.05);
  }
  function handClap({ start, gain = 0.24 }) {
    const bursts=[0,0.012,0.028];
    bursts.forEach((off,i)=>{
      const len=Math.floor(audioCtx.sampleRate*0.06);
      const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
      const data=buf.getChannelData(0);
      for(let n=0;n<len;n++){ const w=(Math.random()*2-1); data[n]=w*Math.pow(1-n/len,2.2); }
      const src=audioCtx.createBufferSource(); src.buffer=buf;
      const g=audioCtx.createGain(); const decay=0.06+i*0.02;
      g.gain.setValueAtTime(gain*(1-i*0.2),start+off);
      g.gain.exponentialRampToValueAtTime(0.0001,start+off+decay);
      src.connect(g).connect(master); src.start(start+off); src.stop(start+off+decay+0.02);
    });
  }
  function tambourine({ start, dur = 0.25, gain = 0.08, pan = 0.1 }) {
    const len=Math.floor(audioCtx.sampleRate*dur);
    const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<len;i++){ const t=i/len; const n=(Math.random()*2-1); data[i]=n*(0.8+0.2*Math.random())*Math.pow(1-t,2.0); }
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const g=audioCtx.createGain(); g.gain.setValueAtTime(gain,start);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    const p=audioCtx.createStereoPanner(); p.pan.setValueAtTime(pan,start);
    src.connect(g).connect(p).connect(master); src.start(start); src.stop(start+dur+0.05);
  }

  if (navigator.vibrate) navigator.vibrate([10,20,10]);

  handClap({ start:t0+0.00, gain:0.24 });
  tambourine({ start:t0+0.00, dur:0.22, gain:0.08, pan:0.12 });
  bell({ freq:784.00, start:t0+0.02, dur:0.45, peak:0.32, pan:-0.05 });

  const chordStart=t0+0.18;
  bell({ freq:523.25, start:chordStart+0.00, dur:0.42, peak:0.28, pan:-0.12 });
  bell({ freq:659.25, start:chordStart+0.01, dur:0.42, peak:0.26, pan:0.00 });
  bell({ freq:783.99, start:chordStart+0.02, dur:0.42, peak:0.24, pan:0.12 });

  bell({ freq:349.23*2, start:chordStart+0.20, dur:0.38, peak:0.26, pan:-0.1 });
  bell({ freq:440.00*2, start:chordStart+0.21, dur:0.38, peak:0.24, pan:0.0 });
  bell({ freq:261.63*2, start:chordStart+0.22, dur:0.38, peak:0.24, pan:0.1 });

  bell({ freq:392.00*2, start:chordStart+0.38, dur:0.38, peak:0.26, pan:-0.1 });
  bell({ freq:493.88*2, start:chordStart+0.39, dur:0.38, peak:0.24, pan:0.0 });
  bell({ freq:293.66*2, start:chordStart+0.40, dur:0.38, peak:0.22, pan:0.1 });

  const spStart=t0+0.44;
  [1046.50,1174.66,1318.51,1567.98,1760.00,2093.00].forEach((f,i)=>{
    bell({ freq:f, start:spStart+i*0.05, dur:0.22, peak:0.18-i*0.02, pan:(i-2)*0.12 });
  });

  const end=t0+0.76;
  handClap({ start:end+0.02, gain:0.20 });
  tambourine({ start:end+0.00, dur:0.22, gain:0.1, pan:-0.1 });
  bell({ freq:523.25, start:end+0.00, dur:0.5, peak:0.34, pan:-0.08 });
  bell({ freq:659.25, start:end+0.01, dur:0.5, peak:0.32, pan:0.00 });
  bell({ freq:783.99, start:end+0.02, dur:0.5, peak:0.30, pan:0.08 });
}

/* 🔔 Tick (per segment) */
function playTick(){
  ensureAudio();
  if (navigator.vibrate) navigator.vibrate(8);
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t0);
  gain.gain.setValueAtTime(0.001, t0);
  gain.gain.linearRampToValueAtTime(0.12, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 0.07);
  if (pointerEl){ pointerEl.classList.remove('ticking'); void pointerEl.offsetWidth; pointerEl.classList.add('ticking'); }
}

/* ====== Mechanische weerstand ====== */
let detentOffset = 0;
const DETENT_BASE = 0.025, DETENT_DECAY = 0.88, DETENT_SNAP_FORWARD = 0.6, DETENT_CLAMP = 0.15;

function spinWheel(){
  if(spinning) return;
  spinning = true;
  lastTickIndex = null;
  detentOffset = 0;
  selectedIndex = -1;       // highlight reset
  drawWheel();

  ensureAudio(); // ontgrendel audio

  const start = rotation;
  const target = start + Math.random()*Math.PI*6 + Math.PI*4; // 4–10π
  const t0 = performance.now(), DURATION = 2600;

  (function anim(t){
    const p = Math.min((t - t0) / DURATION, 1);
    const baseRot = start + (target - start) * (1 - Math.pow(1 - p, 3));

    detentOffset *= DETENT_DECAY;
    if (detentOffset >  DETENT_CLAMP) detentOffset =  DETENT_CLAMP;
    if (detentOffset < -DETENT_CLAMP) detentOffset = -DETENT_CLAMP;

    rotation = baseRot + detentOffset;
    drawWheel();

    const twoPi = Math.PI * 2;
    const a = (Math.PI*1.5 - (rotation % twoPi) + twoPi) % twoPi;
    const idx = Math.floor(a / slice) % categoryLabels.length;

    if (lastTickIndex === null || idx !== lastTickIndex) {
      playTick();
      const speedFactor = (1 - p) * (1 - p);
      const impulse = DETENT_BASE * (0.35 + 0.65 * speedFactor);
      detentOffset -= impulse;
      setTimeout(()=>{ detentOffset += impulse * DETENT_SNAP_FORWARD; }, 60);
      lastTickIndex = idx;
    }

    if (p < 1) {
      requestAnimationFrame(anim);
    } else {
      spinning = false;

      // Finale index
      const finalA = (Math.PI*1.5 - (rotation % twoPi) + twoPi) % twoPi;
      const rawIdx = Math.floor(finalA / slice);
      const finalIdx = ((rawIdx % categoryLabels.length) + categoryLabels.length) % categoryLabels.length;

      // 🔆 Highlight de gekozen categorie op het rad
      selectedIndex = finalIdx;
      drawWheel();

      // 🎯 Kies nu de prijs UIT de gekozen categorie
      const prizeArr = categoryData[finalIdx];
      const prize = randomItem(prizeArr);
      if (!prize) {
        console.warn('Prize undefined – debug info:', { finalA, rawIdx, finalIdx, slice, len: categoryLabels.length });
        openModal('🎁 Verrassing: je bent een topper! 🙌', categoryLabels[finalIdx]);
      } else {
        openModal(prize, categoryLabels[finalIdx]); // popup met prijs + categorie
      }
    }
  })(t0);
}

/* ====== Popup ====== */
function openModal(prizeText, categoryText){
  const catEl = document.getElementById('modalCategory');
  const prizeEl = document.getElementById('modalPrize');
  if (catEl)   catEl.textContent   = categoryText || '';
  if (prizeEl) prizeEl.textContent = prizeText   || '';

  document.getElementById('modal').classList.add('open');
  playGameShowJingle({ volume: 0.65 });
  launchDoubleConfetti();
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  // Highlight uit als popup dicht is (optioneel). Wil je het laten staan? haal deze 2 regels weg.
  selectedIndex = -1;
  drawWheel();
}

/* ====== Start ====== */
drawWheel();
</script>

</body>
</html>
