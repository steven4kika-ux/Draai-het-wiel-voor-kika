
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
/* === styling ongewijzigd, compact gehouden === */
:root{
  --bg:#fff6f6; --card:#ffffff; --accent:#ff6b6b; --text:#222; --muted:#666;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#fff); color:var(--text);
}
.wrapper{max-width:900px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 12px 32px rgba(0,0,0,.12)}
h1{text-align:center;margin:4px 0}
p.lead{text-align:center;color:var(--muted);line-height:1.5}
.buttons{display:flex;flex-direction:column;gap:12px;margin:16px 0}
.button{padding:16px;font-size:18px;font-weight:800;color:#fff;background:var(--accent);border:none;border-radius:16px;cursor:pointer;width:100%}
.button.secondary{background:#555}
.note{background:#ffecec;padding:10px;border-radius:10px;text-align:center;font-size:14px}
.wheel-card{margin-top:18px;background:#fffafa;border-radius:16px;padding:16px;text-align:center}
.pointer{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid var(--accent);margin:0 auto -6px}
canvas{width:100%;max-width:300px;height:auto;background:#fff;border-radius:12px}
.spin-btn{margin-top:14px}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);padding:20px;z-index:1000}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:18px;padding:22px;max-width:420px;width:100%;text-align:center}
.modal-actions{display:flex;flex-direction:column;gap:12px;margin-top:14px}
@media(min-width:900px){.buttons{flex-direction:row}}
</style>
</head>

<body>
<div class="wrapper">
  <div class="card">
    <h1>Doneer aan KiKa 💛</h1>
    <p class="lead">Ik ben Steven en in september skeeler ik 24 uur voor KiKa.<br>Dit draaiwiel is mijn bedankje 🎡</p>

    <div class="buttons">
      <button class="button" onclick="window.open('https://24kika.nl/doneren/?deelnemer=steven-arbon','_blank')">Doneer nu</button>
      <button class="button" onclick="document.getElementById('spinBtn').scrollIntoView({behavior:'smooth'})">Ik heb gedoneerd → Draai!</button>
    </div>

    <div class="note">Prijzen hebben geen geldwaarde</div>

    <div class="wheel-card">
      <div class="pointer"></div>
      <canvas id="wheel" width="300" height="300"></canvas>
      <button id="spinBtn" class="button spin-btn">Draai!</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>🎉 Gefeliciteerd!</h2>
    <p id="prizeText"></p>
    <div class="modal-actions">
      <button id="mailBtn" class="button">📧 Mail mijn prijs</button>
      <button id="closeBtn" class="button secondary">Sluiten</button>
    </div>
  </div>
</div>

<script>
/* === PRIJZEN === */
const prizes=[
  "😂 Mop: Waarom kan een skeeleraar nooit liegen? Hij glijdt er altijd mee weg!",
  "😂 Mop: Ik vroeg het wiel om rust… hij bleef maar draaien.",
  "💡 Feit: Elke donatie helpt KiKa écht.",
  "💛 Quote: Kleine daden maken groot verschil.",
  "🔥 Challenge: Deel de KiKa‑link met 2 vrienden.",
  "👏 Compliment: Wat goed dat jij dit doet!",
  "🧩 Raadsel: Wat wordt natter terwijl het droogt? Een handdoek!",
  "🍀 Geluk: Vandaag heb jij extra geluk verdiend!",
];

/* === WIEL === */
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const angle=2*Math.PI/prizes.length;
let rot=0, spinning=false;

function draw(){
  ctx.clearRect(0,0,300,300);
  prizes.forEach((_,i)=>{
    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,140,i*angle+rot,(i+1)*angle+rot);
    ctx.fillStyle=["#ff6b6b","#ff9f43","#1dd1a1","#54a0ff","#7d5fff","#f368e0","#ffd166","#00d2d3"][i];
    ctx.fill();
  });
}
draw();

/* === SPIN + GELUID (mobiel-proof) === */
document.getElementById("spinBtn").addEventListener("click",()=>{
  if(spinning) return;
  spinning=true;

  // ✅ Audio maken én afspelen in dezelfde klik
  const spinSound = new Audio("wheel-spin-click-slow-down-101152.mp3");
  spinSound.volume = 0.8;
  spinSound.play().catch(()=>{});

  const target=Math.random()*2*Math.PI;
  const start=performance.now();

  function animate(t){
    const p=Math.min(1,(t-start)/3000);
    rot=target*p*p*(3-2*p);
    draw();
    if(p<1) requestAnimationFrame(animate);
    else{
      const index=Math.floor(((2*Math.PI-rot)%(2*Math.PI))/angle);
      showModal(prizes[index]);
      spinning=false;
    }
  }
  requestAnimationFrame(animate);
});

/* === MODAL === */
const modal=document.getElementById("modal");
function showModal(text){
  document.getElementById("prizeText").textContent=text;
  modal.classList.add("show");

  const subject=encodeURIComponent("Mijn KiKa‑prijs 🎉");
  const body=encodeURIComponent(
`Ik heb deze prijs gewonnen via het KiKa‑draaiwiel:

${text}

Steun KiKa:
https://24kika.nl/doneren/?deelnemer=steven-arbon`
  );

  document.getElementById("mailBtn").onclick=()=>
    location.href=`mailto:?subject=${subject}&body=${body}`;
}
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("show");
modal.onclick=e=>{if(e.target===modal) modal.classList.remove("show");};
</script>
</body>
</html>
