
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
/* ===== VARIABLES ===== */
:root{
  --bg:#fff3f4;
  --card:#ffffff;
  --accent:#ff6b6b;
  --accent-dark:#ff5252;
  --text:#222;
  --muted:#666;
  --soft:#fff0f0;
}

*{box-sizing:border-box}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    radial-gradient(120% 60% at 50% -10%, #ffe9ec 0%, transparent 60%),
    linear-gradient(180deg,var(--bg),#ffffff);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.wrapper{
  max-width:440px;
  margin:28px auto 36px;
  padding:0 14px;
}
.card{
  background:var(--card);
  border-radius:28px;
  padding:24px 22px 28px;
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.12),
             inset 0 0 0 1px rgba(255,107,107,.10);
}

/* ===== TEXT ===== */
h1{margin:0 0 6px;font-size:28px;}
.lead{font-size:15px;color:var(--muted);line-height:1.45;margin:0 auto 18px;}

/* ===== BUTTONS ===== */
.buttons{display:flex;gap:12px;flex-direction:column;margin-bottom:14px;}
.button{
  padding:16px;
  font-size:18px;
  font-weight:800;
  border:none;
  border-radius:20px;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
  box-shadow:0 12px 24px rgba(255,107,107,.35);
  transition:transform .12s ease, box-shadow .15s ease;
}
.button:active{transform:translateY(2px);box-shadow:0 6px 14px rgba(0,0,0,.25);}
.button.secondary{background:#f1f1f1;color:#555;box-shadow:none;}

/* ===== INFO ===== */
.note{background:var(--soft);padding:10px 12px;border-radius:14px;font-size:14px;color:#5a5a5a;margin-bottom:18px;}

/* ===== WHEEL ===== */
.wheel-card{
  background:linear-gradient(180deg,#ffffff,#fff6f6);
  border-radius:30px;
  padding:22px 18px 26px;
  box-shadow:inset 0 0 0 1px rgba(255,107,107,.15),
             0 14px 34px rgba(0,0,0,.08);
