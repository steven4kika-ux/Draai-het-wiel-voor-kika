
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draai het wiel voor KiKa 💛</title>

<style>
:root{
  --bg:#fff3f3;
  --card:#ffffff;
  --accent:#ff6b6b;
  --accent-dark:#ff5252;
  --text:#222;
  --muted:#777;
  --soft:#fff0f0;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#ffffff);
  color:var(--text);
}

/* LAYOUT */
.wrapper{
  max-width:860px;
  margin:0 auto;
  padding:20px 14px 32px;
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:22px 20px 26px;
  box-shadow:
    0 10px 30px rgba(0,0,0,.08),
    inset 0 0 0 1px rgba(255,107,107,.08);
}

/* TYPO */
h1{
  text-align:center;
  margin:4px 0 6px;
  font-size:28px;
  letter-spacing:.2px;
}

.lead{
  text-align:center;
  color:var(--muted);
  font-size:15px;
  line-height:1.45;
  margin:0 auto 18px;
  max-width:620px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:12px;
  flex-direction:column;
  margin-bottom:14px;
}

.button{
  padding:16px 18px;
  font-size:18px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(180deg,var(--accent),var(--accent-dark));
