
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Draai aan het wiel 🎡</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff6f6;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,.15);
  text-align: center;
}

canvas {
  width: 100%;
  max-width: 300px;
  height: auto;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 16px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  background: #ff6b6b;
  color: #fff;
  cursor: pointer;
}

.result {
  margin-top: 16px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Draai aan het wiel 🎡</h1>
  <canvas id="wheel" width="300" height="300"></canvas>
  <button onclick="spin()">Draai!</button>
  <div class="result" id="result"></div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const opties = [
  "😂 Mop",
  "💡 Feit",
  "💛 Quote",
  "🔥 Challenge"
];

const prijzen = {
  "😂 Mop": "Waarom kan een skeeleraar nooit liegen? Die glijdt altijd weg.",
  "💡 Feit": "Elke donatie helpt onderzoek naar betere behandelingen.",
  "💛 Quote": "Kleine daden maken groot verschil.",
  "🔥 Challenge": "Stuur vandaag iemand een lief bericht."
};

const kleuren = ["#ff6b6b","#ff9f43","#1dd1a1","#54a0ff"];
const hoek = 2 * Math.PI / opties.length;
let hoekStart = 0;

function tekenWiel() {
  for (let i = 0; i < opties.length; i++) {
    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.fillStyle = kleuren[i];
    ctx.arc(
      150,
      150,
      140,
      hoekStart + i * hoek,
      hoekStart + (i + 1) * hoek
    );
    ctx.fill();
  }
}

function spin() {
  const draai = Math.random() * 360 + 720;
  let graden = 0;

  const interval = setInterval(() => {
    graden += 10;
    ctx.clearRect(0,0,300,300);
    hoekStart = (graden * Math.PI) / 180;
    tekenWiel();

    if (graden >= draai) {
      clearInterval(interval);
      const keuze = opties[Math.floor(Math.random() * opties.length)];
      document.getElementById("result").textContent = prijzen[keuze];
    }
  }, 20);
}

tekenWiel();
</script>

</body>
</html>
``
